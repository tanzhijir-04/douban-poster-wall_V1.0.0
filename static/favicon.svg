<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
    <defs>
        <!-- 基础外轮廓 -->
        <clipPath id="squircle">
            <rect width="512" height="512" rx="115" ry="115" />
        </clipPath>

        <!-- 海报网格遮罩 (用于内部描边隔离) -->
        <clipPath id="grid-clip">
            <rect width="512" height="512" />
        </clipPath>

        <!-- === 各式电影海报颜色的渐变抽象 === -->
        
        <!-- Row 0: 顶部被截断的一排 -->
        <linearGradient id="p-0-0" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e3a8a"/></linearGradient>
        <linearGradient id="p-0-1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e2e8f0"/><stop offset="100%" stop-color="#94a3b8"/></linearGradient>
        <linearGradient id="p-0-2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4c0519"/><stop offset="100%" stop-color="#be123c"/></linearGradient>
        <linearGradient id="p-0-3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4a044e"/><stop offset="100%" stop-color="#d946ef"/></linearGradient>

        <!-- Row 1: 视觉中心排 -->
        <linearGradient id="p-1-0" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fef08a"/><stop offset="100%" stop-color="#b45309"/></linearGradient>
        <!-- 核心：豆瓣高亮绿 -->
        <linearGradient id="p-1-1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#4ade80"/><stop offset="100%" stop-color="#16a34a"/></linearGradient>
        <linearGradient id="p-1-2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#334155"/><stop offset="100%" stop-color="#020617"/></linearGradient>
        <linearGradient id="p-1-3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#818cf8"/><stop offset="100%" stop-color="#312e81"/></linearGradient>

        <!-- Row 2: 底部排 -->
        <linearGradient id="p-2-0" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ea580c"/><stop offset="100%" stop-color="#7c2d12"/></linearGradient>
        <linearGradient id="p-2-1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2dd4bf"/><stop offset="100%" stop-color="#0f766e"/></linearGradient>
        <linearGradient id="p-2-2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fcd34d"/><stop offset="100%" stop-color="#d97706"/></linearGradient>
        <linearGradient id="p-2-3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1d4ed8"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>

        <!-- 屏幕反光与暗角 -->
        <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
            <stop offset="30%" stop-color="#000" stop-opacity="0" />
            <stop offset="100%" stop-color="#000" stop-opacity="0.8" />
        </radialGradient>
        <linearGradient id="glare" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#fff" stop-opacity="0.15" />
            <stop offset="40%" stop-color="#fff" stop-opacity="0.02" />
            <stop offset="40.1%" stop-color="#fff" stop-opacity="0" />
        </linearGradient>
    </defs>

    <g clip-path="url(#squircle)">
        <!-- 底色 -->
        <rect width="512" height="512" fill="#000" />

        <!-- === 密集的 4x3 海报网格布局 === -->
        <g stroke="#000" stroke-width="2" clip-path="url(#grid-clip)">
            <!-- 第一排 (Y: -32) -->
            <rect x="0" y="-32" width="128" height="192" fill="url(#p-0-0)" />
            <rect x="128" y="-32" width="128" height="192" fill="url(#p-0-1)" />
            <rect x="256" y="-32" width="128" height="192" fill="url(#p-0-2)" />
            <rect x="384" y="-32" width="128" height="192" fill="url(#p-0-3)" />

            <!-- 第二排 (Y: 160) - 居中焦点排 -->
            <rect x="0" y="160" width="128" height="192" fill="url(#p-1-0)" />
            <rect x="128" y="160" width="128" height="192" fill="url(#p-1-1)" />
            <rect x="256" y="160" width="128" height="192" fill="url(#p-1-2)" />
            <rect x="384" y="160" width="128" height="192" fill="url(#p-1-3)" />

            <!-- 第三排 (Y: 352) -->
            <rect x="0" y="352" width="128" height="192" fill="url(#p-2-0)" />
            <rect x="128" y="352" width="128" height="192" fill="url(#p-2-1)" />
            <rect x="256" y="352" width="128" height="192" fill="url(#p-2-2)" />
            <rect x="384" y="352" width="128" height="192" fill="url(#p-2-3)" />
        </g>

        <!-- === 抽象细节：海报底部的黑色片名遮罩条 === -->
        <!-- 用极简的方式模拟电影海报的文本区，增加马赛克质感 -->
        <g fill="#000" opacity="0.4">
            <rect x="0" y="120" width="512" height="40" />
            <rect x="0" y="312" width="512" height="40" />
            <rect x="0" y="504" width="512" height="40" />
        </g>

        <!-- 抽象细节：虚构的极简“文字线” -->
        <g fill="#fff" opacity="0.25" rx="2">
            <!-- Row 0 文本 -->
            <rect x="16" y="138" width="60" height="6" />
            <rect x="144" y="138" width="80" height="6" />
            <rect x="272" y="138" width="40" height="6" />
            <rect x="400" y="138" width="70" height="6" />
            
            <!-- Row 1 文本 -->
            <rect x="16" y="330" width="75" height="6" />
            <!-- 中间绿色海报的文字提亮 -->
            <rect x="144" y="330" width="90" height="6" fill="#fff" opacity="0.6" />
            <rect x="272" y="330" width="55" height="6" />
            <rect x="400" y="330" width="85" height="6" />

            <!-- Row 2 文本 -->
            <rect x="16" y="522" width="50" height="6" />
            <rect x="144" y="522" width="60" height="6" />
            <rect x="272" y="522" width="80" height="6" />
            <rect x="400" y="522" width="40" height="6" />
        </g>

        <!-- === 焦点标识：智能电视的 Hover 绿框 === -->
        <!-- 强调这是豆瓣的海报墙，且正在交互 -->
        <rect x="128" y="160" width="128" height="192" fill="none" stroke="#4ade80" stroke-width="6" />
        
        <!-- === 屏幕质感覆盖层 === -->
        <!-- 暗角 (屏幕边缘变暗) -->
        <rect width="512" height="512" fill="url(#vignette)" style="mix-blend-mode: multiply;" />
        <!-- 玻璃对角线反光 -->
        <rect width="512" height="512" fill="url(#glare)" />

        <!-- === 外层质感描边 === -->
        <rect width="512" height="512" rx="115" ry="115" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="4" />
    </g>
</svg>