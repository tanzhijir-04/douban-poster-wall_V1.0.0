<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="豆瓣观影海报墙 - 自动爬取豆瓣已看和想看电影海报，生成个性化海报墙展示">
    <meta property="og:title" content="我的豆瓣观影海报墙">
    <meta property="og:description" content="自动爬取豆瓣电影海报，生成苹果风格海报墙展示">
    <title>我的豆瓣观影海报墙</title>
    <link rel="icon" href="static/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="static/css/reset.css">
    <link rel="stylesheet" href="static/css/common.css">
    <link rel="stylesheet" href="static/css/poster-wall.css">
    <noscript>请启用 JavaScript 以查看海报墙</noscript>
</head>
<body>
    <header class="header apple-animate">
        <h1>我的豆瓣观影海报墙</h1>
        <button class="glass-btn" aria-label="进入屏保模式" onclick="window.location.href='screensaver.html'">

    <div class="stats apple-animate" id="stats">
        共 <span id="posterCount">0</span> 张海报
    </div>

    <div class="loading" id="loading">加载海报中...</div>

    <main class="poster-wall apple-animate" id="posterWall"></main>

    <script src="static/js/poster-wall.js" defer></script>
</body>
</html>
